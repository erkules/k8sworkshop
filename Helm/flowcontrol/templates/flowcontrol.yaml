{{/* eigentlich doof mit ungesetzen Werten zu arbeiten */}}
{{ if .Values.greetings }}
greetings: {{ .Values.greetings | quote | upper  }}
{{ else }}
greetings: "hmpf"
{{ end }}

friends: 
{{- range .Values.friends }}
- {{ . }}
{{- end }}


dictionary:
{{- range $key, $val :=.Values.person }}
  {{ $key }}: {{ $val }}
  {{- if kindIs "float64"  $val }}
  {{- if and (eq $key "alter") (gt (int $val)  30) }} {{ "tja: alter sack" | nindent 2 }}  {{- else }} {{ "tja:  dumm gelaufen" | nindent 2 }} {{- end }}
  {{ else }} {{ typeOf $val }}
  {{ end }}
{{- end }}

getting: {{ get .Values.person "name" }}
nameistindict: {{ if (hasKey .Values.person "name") -}} jo {{- else -}} no {{- end }}

