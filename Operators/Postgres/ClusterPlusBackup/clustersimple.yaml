apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: baked-cluster
spec:
  instances: 3
  primaryUpdateStrategy: unsupervised
  storage: 
    size: 1Gi
  monitoring:
    enablePodMonitor: true
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: backup-store
