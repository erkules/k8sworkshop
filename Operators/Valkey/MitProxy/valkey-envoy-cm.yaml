apiVersion: v1
kind: ConfigMap
metadata:
  name: valkey-envoy
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: valkey_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 6379

          filter_chains:
            - filters:
                - name: envoy.filters.network.redis_proxy
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.redis_proxy.v3.RedisProxy

                    stat_prefix: valkey

                    settings:
                      op_timeout: 5s
                      enable_redirection: true
                      read_policy: MASTER

                    prefix_routes:
                      catch_all_route:
                        cluster: valkey_cluster

      clusters:
        - name: valkey_cluster
          connect_timeout: 2s

          lb_policy: CLUSTER_PROVIDED

          load_assignment:
            cluster_name: valkey_cluster
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: valkey-valkeycluster
                          port_value: 6379

          cluster_type:
            name: envoy.clusters.redis
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.clusters.redis.v3.RedisClusterConfig

              cluster_refresh_rate: 5s
              cluster_refresh_timeout: 3s

              redirect_refresh_interval: 2s
              redirect_refresh_threshold: 1

              failure_refresh_threshold: 1
              host_degraded_refresh_threshold: 1

    admin:
      access_log_path: /dev/stdout
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901
