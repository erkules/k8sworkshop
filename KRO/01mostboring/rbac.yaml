apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: boring
rules:
  - apiGroups: ["kro.run"]
    resources: ["borings"]
    verbs: ["*"]
---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: boring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: boring
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: devopscon
